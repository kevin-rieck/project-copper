name: Frontend security and build

on:
  push:
    paths:
      - "morbus/frontend/**"
      - ".github/workflows/frontend-security.yml"
  pull_request:
    paths:
      - "morbus/frontend/**"
      - ".github/workflows/frontend-security.yml"
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: morbus/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: morbus/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Production audit
        run: npm run audit:prod

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
